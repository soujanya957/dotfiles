# ═══════════════════════════════════════════════════════════
# 🌈 TERMINAL CAPABILITIES
# ═══════════════════════════════════════════════════════════
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"
set-option -sa terminal-overrides ",alacritty:RGB"
set-option -sa terminal-overrides ",*256col*:Tc"

# ═══════════════════════════════════════════════════════════
# ⌨️  PREFIX & KEYBINDINGS
# ═══════════════════════════════════════════════════════════
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind r
bind r source-file ~/.tmux.conf \; display-message "󰑓 Config reloaded!"

unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind , command-prompt -I "#W" "rename-window '%%'"

bind -r j resize-pane -D 3
bind -r k resize-pane -U 3
bind -r l resize-pane -R 3
bind -r h resize-pane -L 3

bind -r m resize-pane -Z

# ═══════════════════════════════════════════════════════════
# 🎨 VISUAL ENHANCEMENTS
# ═══════════════════════════════════════════════════════════
set -g mouse on
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ═══════════════════════════════════════════════════════════
# ⚡ PERFORMANCE & BEHAVIOR
# ═══════════════════════════════════════════════════════════
set -sg escape-time 0
set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set-option -g allow-rename on 

# ═══════════════════════════════════════════════════════════
# 🎭 THEME: TOKYONIGHT ULTRA GLASS
# ═══════════════════════════════════════════════════════════
TN_BG_GLASS="#1a1b26"
TN_FG="#c0caf5"
TN_FG_DIM="#a9b1d6"
TN_BLUE="#7aa2f7"
TN_CYAN="#7dcfff"
TN_PURPLE="#bb9af7"
TN_COMMENT="#565f89"

# --- Status bar ---
set -g status on
set -g status-position top
set -g status-justify centre
set -g status-style "bg=$TN_BG_GLASS,fg=$TN_FG"

set -g status-left-length 40
set -g status-right-length 30
set -g status-left ""
set -g status-right ""

# ═══════════════════════════════════════════════════════════
# 🏷️  WINDOW STATUS STYLING
# ═══════════════════════════════════════════════════════════
set -g window-status-separator " "

# Inactive window
setw -g window-status-style "bg=$TN_BG_GLASS,fg=$TN_FG_DIM"
setw -g window-status-format " #I ⋅ [ #W ] "

# Active window
setw -g window-status-current-style "bg=$TN_BLUE,fg=black,bold"
setw -g window-status-current-format " #I ⋅ [ #W ] "

# ═══════════════════════════════════════════════════════════
# 🎨 PANE & WINDOW STYLING
# ═══════════════════════════════════════════════════════════
setw -g window-style "fg=#a9b1d6,bg=default"
setw -g window-active-style "fg=#c0caf5,bg=default"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

set -g message-style "fg=#7dcfff,bg=#292e42"
set -g message-command-style "fg=#bb9af7,bg=#292e42"
set -g mode-style "fg=#1a1b26,bg=#9ece6a"

# ═══════════════════════════════════════════════════════════
# 🔌 PLUGINS
# ═══════════════════════════════════════════════════════════
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# ═══════════════════════════════════════════════════════════
# 🚀 ADVANCED FEATURES
# ═══════════════════════════════════════════════════════════
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key f run-shell "tmux neww 'tmux list-sessions | fzf --reverse | cut -d: -f1 | xargs tmux switch-client -t'"
bind-key -n M-h previous-window
bind-key -n M-l next-window
bind C-l send-keys 'C-l'
bind-key S command-prompt -p "󰆍 New session:" "new-session -s '%%'"

set -g @floax-bind 'z'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

# ═══════════════════════════════════════════════════════════
# 🎯 FINAL TOUCHES
# ═══════════════════════════════════════════════════════════
setw -g clock-mode-colour "#7aa2f7"
setw -g clock-mode-style 24

setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#bb9af7,bg=#1a1b26"

set -g visual-bell on
set -g bell-action any

run '~/.tmux/plugins/tpm/tpm'
